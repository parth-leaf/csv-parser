<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Upload Page</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">
      <h1 class="text-3xl font-semibold text-center text-gray-800 mb-6">
        Upload File
      </h1>

      <form class="space-y-5">
        <!-- File Upload Area -->
        <label
          for="fileUpload"
          class="flex flex-col items-center justify-center w-full h-52 border-2 border-dashed border-blue-400 rounded-xl cursor-pointer bg-blue-50 hover:bg-blue-100 transition"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-14 h-14 text-blue-500 mb-3"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M7 16a4 4 0 01-.88-7.903A5 5 0 0115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"
            />
          </svg>

          <p class="text-gray-700 font-medium">
            Click to upload or drag & drop
          </p>

          <input
            id="fileUpload"
            type="file"
            accept=".csv,text/csv"
            class="hidden"
          />
        </label>

        <!-- File Name Preview -->
        <div id="fileName" class="text-sm text-gray-600"></div>

        <!-- Upload Button -->
        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition duration-300"
        >
          Upload File
        </button>
      </form>
    </div>

    <div
      id="overlay"
      class="fixed inset-0 bg-black/60 justify-center items-center hidden backdrop-blur-xl"
    >
      <div class="text-3xl animate-pulse capitalize font-bold">loading...</div>
    </div>

    <!-- JavaScript -->
    <script>
      const fileInput = document.getElementById("fileUpload");
      const fileName = document.getElementById("fileName");
      const form = document.querySelector("form");
      const loader = document.querySelector("#overlay");

      fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];

        if (!file) return;

        // Validate CSV file
        const isCSV =
          file.type === "text/csv" || file.name.toLowerCase().endsWith(".csv");

        if (!isCSV) {
          alert("Only CSV files are allowed!");
          fileInput.value = "";
          fileName.textContent = "";
          return;
        }

        fileName.textContent = `Selected File: ${file.name}`;
      });

      // Send file to API
      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const file = fileInput.files[0];

        if (!file) {
          alert("Please select a CSV file.");
          return;
        }

        loader.classList.replace("hidden", "flex");
        try {
          const response = await fetch("/upload", {
            method: "POST",
            body: file,
          });

          if (!response.ok) {
            throw new Error("Upload failed");
          }

          alert("File uploaded successfully!");

          const blob = await response.blob();

          // Create download link
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "uploaded.json"; // filename
          document.body.appendChild(a);
          a.click();

          // cleanup
          a.remove();
          window.URL.revokeObjectURL(url);

          fileName.textContent = "";
          fileInput.value = "";
        } catch (error) {
          console.error(error);
          alert("Error uploading file.");
        } finally {
          loader.classList.replace("flex", "hidden");
        }
      });
    </script>
  </body>
</html>
